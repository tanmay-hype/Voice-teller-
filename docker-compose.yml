version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: story_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aivoice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: story_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: story_api
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:tanmay15@db:5432/aivoice
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - SECRET_KEY=${SECRET_KEY}

#  worker:
#    build:
#      context: ./backend
#      dockerfile: Dockerfile
#    container_name: story_worker
#    command: celery -A worker.celery_app worker --loglevel=info
#    volumes:
#      - ./backend:/app
#    depends_on:
#      - db
#      - redis
#    environment:
#      - DATABASE_URL=postgresql+asyncpg://postgres:tanmay15@db:5432/aivoice
#      - CELERY_BROKER_URL=redis://redis:6379/0
#      - CELERY_RESULT_BACKEND=redis://redis:6379/0
#      - OPENAI_API_KEY=${OPENAI_API_KEY}
 #     - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}  

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: story_web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
